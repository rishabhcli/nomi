name: Mnemo CI

on:
  push:
    branches: [main, 'agent-c/**', 'cursor/**']
  pull_request:
    branches: [main]

jobs:
  observability:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode-beta.app ]; then
            echo "DEVELOPER_DIR=/Applications/Xcode-beta.app/Contents/Developer" >> $GITHUB_ENV
          fi
      - name: CI gate
        run: chmod +x scripts/*.sh && ./scripts/ci.sh
      - name: Upload badge artifact
        uses: actions/upload-artifact@v4
        with:
          name: mnemo-ci-badge
          path: .build/ci/artifacts/badge.json
          if-no-files-found: ignore
